server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Docker/Swarm embedded DNS. Resolving the `collab` upstream through a variable
  # + resolver defers name lookup to request time, so nginx starts even when the
  # collab service isn't up yet and re-resolves if its IP changes across redeploys.
  # A literal `proxy_pass http://collab:...` instead resolves once at startup and
  # hard-fails with "host not found in upstream" if collab isn't ready that instant.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $collab collab;

  # static frontend
  location / { try_files $uri $uri/ /index.html; }

  # OAuth endpoints on the node server (path kept as-is: /auth/... -> /auth/...)
  location /auth/ {
    proxy_pass http://$collab:42420;
    proxy_set_header Host $host;
    # preserve Caddy's external scheme so node builds https redirects + Secure cookies
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  }

  # Yjs WebSocket sync ( /collab/mob:room  ->  node sees /mob:room )
  location /collab/ {
    rewrite ^/collab/(.*)$ /$1 break;   # strip the /collab/ prefix before proxying
    proxy_pass http://$collab:42420;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600s;   # keep long-lived sockets open
  }
}
