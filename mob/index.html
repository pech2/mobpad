<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>p5 mob · Nature of Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="lobby">
    <div class="card">
      <h1>p5 mob · Nature of Code</h1>
      <p>Create a room and share the code with your mob — or join one.</p>
      <button id="create" class="primary">Create a room</button>
      <div class="or">or join existing</div>
      <div class="joinrow">
        <input id="roomInput" placeholder="room code, e.g. coral-otter-318" autocomplete="off" spellcheck="false">
        <button id="join">Join</button>
      </div>
    </div>
  </div>

  <header>
    <strong>p5 mob</strong>
    <span id="room" class="room"></span>
    <button id="copy">Copy invite</button>
    <span id="count">…</span>
    <span id="presence"></span>
    <label class="auto"><input type="checkbox" id="auto" checked> auto-run</label>
    <button id="run">Run ⌘↵</button>
    <button id="switch" title="Leave this room">Switch</button>
  </header>

  <main>
    <section class="editor-col">
      <div class="tabs">
        <button class="tab" data-file="html">HTML</button>
        <button class="tab" data-file="css">CSS</button>
        <button class="tab active" data-file="js">JS</button>
      </div>
      <textarea id="editor" spellcheck="false"></textarea>
    </section>
    <iframe id="stage" title="sketch"></iframe>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
