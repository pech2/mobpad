<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mobpad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="authgate" style="display:none">
    <div class="card">
      <h1>mobpad</h1>
      <p>Sign in with your Recurse Center account to join a room.</p>
      <button id="login" class="primary">Log in with Recurse</button>
    </div>
  </div>

  <div id="lobby">
    <div class="card">
      <h1>mobpad</h1>
      <p>Create a room and share the code with your mob — or join one.</p>
      <button id="create" class="primary">Create a room</button>
      <div class="or">or join existing</div>
      <div class="joinrow">
        <input id="roomInput" placeholder="room code, e.g. coral-otter-318" autocomplete="off" spellcheck="false">
        <button id="join">Join</button>
      </div>
    </div>
  </div>

  <header>
    <strong>mobpad</strong>
    <span id="room" class="room"></span>
    <button id="copy">Copy invite</button>
    <span id="count">…</span>
    <input id="nameInput" class="name" placeholder="your name" maxlength="24" spellcheck="false" autocomplete="off" title="Your display name">
    <span id="presence"></span>
    <label class="auto"><input type="checkbox" id="auto" checked> auto-run</label>
    <label class="auto"><input type="checkbox" id="cursors" checked> cursors</label>
    <button id="run">Run ⌘↵</button>
    <button id="switch" title="Leave this room">Switch</button>
  </header>

  <main>
    <section class="editor-col">
      <div class="tabs">
        <button class="tab" data-file="html">HTML</button>
        <button class="tab" data-file="css">CSS</button>
        <button class="tab active" data-file="js">JS</button>
      </div>
      <div class="editor-wrap">
        <textarea id="editor" spellcheck="false"></textarea>
        <div id="cursorLayer" class="cursors"></div>
      </div>
    </section>
    <iframe id="stage" title="sketch"></iframe>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
